# ASP.NET build + tests + gated production deploy (multi-stage YAML — no classic release pipeline)
#
# Stages:
#   Build  — three parallel jobs:
#     1) Windows: build the whole solution, run unit/component/approval tests, publish the
#        deployable Web zip + EF migration bundle into the 'drop' artifact.
#     2) Linux:   run the Testcontainers-backed integration suite against an ephemeral
#        SQL Server 2025 instance (ubuntu-latest ships Docker + Linux containers).
#     3) Linux:   run the Playwright E2E suite — the real web app on Kestrel against an
#        ephemeral SQL Server, with WireMock standing in for phoenix.piugame.com.
#   Deploy — main-branch runs only. A deployment job against the 'production' environment:
#        applies pending EF migrations (efbundle), then zip-deploys the Web app.
#
# The manual gate lives on the ENVIRONMENT, not in this file:
#   Pipelines → Environments → production → Approvals and checks → add an Approval with
#   yourself as approver. Every run then pauses before the Deploy stage until you sign off.
#
# One-time setup (owner) — do 1 and 2 BEFORE merging this to main:
#   1. Pre-create the 'production' environment (Pipelines → Environments → New environment)
#      and add an Approval check with yourself as approver. Runs triggered by the GitHub app
#      can't auto-create environments, and without the check the deploy sails straight through.
#   2. Pipeline → Edit → Variables → add secret variable ProdSqlConnectionString.
#   3. First deploy run will prompt to permit this pipeline to use the service connection and
#      environment — approve both.
#   4. Disable/delete the classic release pipeline so it doesn't double-deploy off the drop.
#   5. Live-site deploy gate: the integration job pulls a real PIU account from the
#      arrow-eclipse Key Vault (secrets PiuTest-Username / PiuTest-Password) so the
#      live-site smoke tests run on every build. Before merging this: create both secrets
#      and grant the service connection's identity get/list on the vault's secrets.

trigger:
- main

pr:
- main

variables:
  solution: 'ScoreTracker/ScoreTracker.sln'
  buildConfiguration: 'Release'
  # DartSassBuilder's build tool targets net8.0; UseDotNet@2 installs only .NET 10 into an
  # isolated tool cache, so without this the sass compile step dies with "framework not
  # found" on every agent. Variables flow to script steps as env vars — this one tells
  # hostfxr to run net8-targeting tools on the newer runtime.
  DOTNET_ROLL_FORWARD: 'Major'
  azureServiceConnection: 'Pay-As-You-Go (71fd4e21-2111-4006-988f-28fa73d3d655)'  # ARM connection (Workload Identity federation)
  webAppName: 'piuscores'  # Windows App Service in resource group Sharkingbird

stages:
- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildAndUnitTests
    displayName: 'Build + Unit/Component/Approval Tests (Windows)'
    pool:
      vmImage: 'windows-latest'
    steps:
    # nuget.exe + VSBuild can't handle this solution anymore: NuGet-resolved MSBuild SDKs
    # (Aspire.AppHost.Sdk) never get assets files from nuget.exe restore, and VS 2022's
    # MSBuild doesn't support net10 targets. The dotnet CLI is the supported path.
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'

    # SonarQube Cloud analysis brackets the build: Prepare BEFORE restore/build (it hooks the
    # compiler), Analyze + Publish after the test steps. Requires (once, owner-side): the
    # "SonarQube Cloud" Marketplace extension installed in the joneccker DevOps org, and a
    # service connection named 'SonarCloud' holding a sonarcloud.io token (My Account →
    # Security). PR decoration comes from the SonarQube Cloud GitHub app via the project
    # binding created when the project is imported on sonarcloud.io.
    - task: SonarCloudPrepare@4
      displayName: 'Prepare SonarQube Cloud analysis'
      inputs:
        SonarCloud: 'SonarCloud'
        organization: 'drmurloc'                        # verify against the SonarCloud org key
        scannerMode: 'dotnet'
        projectKey: 'DrMurloc_PumpItUpScoreTracker'     # verify against the imported project's key
        projectName: 'PumpItUpScoreTracker'
        extraProperties: |
          # EF migrations are generated code — 89k of the repo's 128k C# lines; analyzing
          # them buries real findings and wrecks the new-code metrics.
          sonar.exclusions=**/Migrations/**
          # Coverage comes from the coverlet collectors on the two fast suites below.
          # Before this property existed the analysis had NO coverage input, so the
          # gate's coverage-on-new-code condition read 0.0% on every PR.
          sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/**/coverage.opencover.xml
          # The coverage METRIC is scoped to where the house philosophy says it matters
          # (CLAUDE.md): Domain models/services and Application handlers. Blazor UI (no
          # unit harness), EF/vendor adapters and vertical Infrastructure/ (covered by
          # the real-DB integration and E2E suites, whose coverage never reaches this
          # Windows analysis), and composition wiring are excluded from the metric —
          # they are still fully analyzed for issues.
          sonar.coverage.exclusions=**/*.razor,ScoreTracker/ScoreTracker/**,**/Infrastructure/**,ScoreTracker/ScoreTracker.Data/**,ScoreTracker/ScoreTracker.CompositionRoot/**,ScoreTracker/ScoreTracker.AppHost/**,ScoreTracker/ScoreTracker.ServiceDefaults/**

    - script: dotnet restore $(solution)
      displayName: 'Restore'

    - script: dotnet build $(solution) -c $(buildConfiguration) --no-restore
      displayName: 'Build'

    # The integration project builds alongside but runs in the Linux job below — it needs
    # Docker with Linux containers, which windows-latest doesn't have configured.
    - script: dotnet test ScoreTracker/ScoreTracker.Tests/ScoreTracker.Tests.csproj -c $(buildConfiguration) --no-build --logger "trx;LogFileName=unit.trx" --results-directory $(Agent.TempDirectory) --collect:"XPlat Code Coverage;Format=opencover"
      displayName: 'Unit/Component tests'

    - script: dotnet test ScoreTracker/ScoreTracker.Tests.Api/ScoreTracker.Tests.Api.csproj -c $(buildConfiguration) --no-build --logger "trx;LogFileName=api.trx" --results-directory $(Agent.TempDirectory) --collect:"XPlat Code Coverage;Format=opencover"
      displayName: 'API wire-shape approval tests'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/**/*.trx'
        failTaskOnFailedTests: true

    - task: SonarCloudAnalyze@4
      displayName: 'Run SonarQube Cloud analysis'

    - task: SonarCloudPublish@4
      displayName: 'Publish SonarQube Cloud quality gate'
      inputs:
        pollingTimeoutSec: '300'

    - script: dotnet publish ScoreTracker/ScoreTracker/ScoreTracker.Web.csproj -c $(buildConfiguration) --no-restore -o $(Agent.TempDirectory)/publish
      displayName: 'Publish Web app'

    - task: ArchiveFiles@2
      displayName: 'Zip Web app'
      inputs:
        rootFolderOrFile: '$(Agent.TempDirectory)/publish'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/ScoreTracker.Web.zip'

    # Deploy-time migrations: a self-contained bundle ships in the drop and the Deploy stage
    # below runs it right before the app deploy — automated per-deploy, never at app startup.
    # It exits 0 with nothing to do when the database is already current.
    - script: dotnet tool restore
      displayName: 'Restore dotnet tools (dotnet-ef)'

    - script: dotnet ef migrations bundle --project ScoreTracker/ScoreTracker.Data --startup-project ScoreTracker/ScoreTracker.CompositionRoot --configuration $(buildConfiguration) --self-contained -r win-x64 --force -o $(Build.ArtifactStagingDirectory)/efbundle.exe
      displayName: 'Create EF migration bundle'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

  - job: IntegrationTests
    displayName: 'Integration Tests (Linux, Testcontainers + SQL Server 2025 + live PIU site)'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'

    # The live-site smoke tests (Tests.Integration/LiveSite/) need a real PIU account; it
    # lives in Key Vault, and this task surfaces the two secrets as secret pipeline
    # variables for this job only. Scraper rot against the real site fails this job — and
    # a failed Build stage means the deploy stage never runs.
    - task: AzureKeyVault@2
      displayName: 'Pull PIU test account from Key Vault'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        KeyVaultName: 'arrow-eclipse'
        SecretsFilter: 'PiuTest-Username,PiuTest-Password'
        RunAsPreJob: false

    # First run on a fresh agent pulls the SQL Server 2025 image (~2 min). Subsequent tests against
    # the same agent are fast — but Microsoft-hosted agents are fresh per run, so expect that cost
    # every time. ~3 min total job runtime on a clean agent.
    # Secret variables are never auto-exposed to scripts — the explicit env mapping below is
    # what lets the LiveSite tests see the account (everywhere else they skip).
    - script: dotnet test ScoreTracker/ScoreTracker.Tests.Integration/ScoreTracker.Tests.Integration.csproj -c $(buildConfiguration) --logger "trx;LogFileName=integration.trx" --results-directory $(Agent.TempDirectory)
      displayName: 'Run integration tests (real SQL Server 2025 via Testcontainers + live PIU site)'
      env:
        PIU_TEST_USERNAME: $(PiuTest-Username)
        PIU_TEST_PASSWORD: $(PiuTest-Password)

    - task: PublishTestResults@2
      displayName: 'Publish integration test results'
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/**/integration.trx'
        testRunTitle: 'Integration Tests (SQL Server 2025)'
        failTaskOnFailedTests: true

  - job: E2ETests
    displayName: 'E2E Tests (Linux, Playwright + Kestrel + Testcontainers + WireMock PIU)'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'

    - script: dotnet build ScoreTracker/ScoreTracker.Tests.E2E/ScoreTracker.Tests.E2E.csproj -c $(buildConfiguration)
      displayName: 'Build E2E project'

    # The build drops playwright.ps1 next to the test binaries; --with-deps also installs
    # the Chromium OS package dependencies the hosted agent lacks.
    - script: pwsh ScoreTracker/ScoreTracker.Tests.E2E/bin/$(buildConfiguration)/net10.0/playwright.ps1 install --with-deps chromium
      displayName: 'Install Playwright Chromium'

    - script: dotnet test ScoreTracker/ScoreTracker.Tests.E2E/ScoreTracker.Tests.E2E.csproj -c $(buildConfiguration) --no-build --logger "trx;LogFileName=e2e.trx" --results-directory $(Agent.TempDirectory)
      displayName: 'Run E2E tests (real app on Kestrel, stubbed PIU site)'

    - task: PublishTestResults@2
      displayName: 'Publish E2E test results'
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/**/e2e.trx'
        testRunTitle: 'E2E Tests (Playwright)'
        failTaskOnFailedTests: true

# Compile-time gate: the stage only exists in main-branch runs, so PR builds stop after
# Build. A runtime `condition:` is NOT enough here — environment authorization is resolved
# at run creation for every stage in the graph, so PR runs would fail on the 'production'
# environment before any condition is evaluated. The environment's approval check is what
# makes this wait for a human — see the header comment.
- ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: Build
    jobs:
    - deployment: Deploy
      displayName: 'Migrate database + deploy Web app'
      pool:
        vmImage: 'windows-latest'  # efbundle.exe is built self-contained for win-x64
      environment: 'production'
      strategy:
        runOnce:
          deploy:
            steps:
            # Deployment jobs download the run's artifacts automatically → $(Pipeline.Workspace)/drop.
            # Migrations run first: if they fail, the release stops here and the old app keeps
            # serving against the old schema. All pending migrations are additive-first by policy.
            - script: '"$(Pipeline.Workspace)\drop\efbundle.exe" --connection "$(ProdSqlConnectionString)"'
              displayName: 'Apply EF migrations'

            - task: AzureWebApp@1
              displayName: 'Deploy Web app (zip deploy)'
              inputs:
                azureSubscription: '$(azureServiceConnection)'
                appType: 'webApp'
                appName: '$(webAppName)'
                package: '$(Pipeline.Workspace)/drop/ScoreTracker.Web.zip'
